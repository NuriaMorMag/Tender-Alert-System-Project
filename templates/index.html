<!DOCTYPE html>
<html>
<head>
    <title>Tender Alerts</title>
</head>
<body>
    <h1>Register your company</h1>

    <!-- Registration form -->
    <form action="/register" method="post">
        <!-- Email input -->
        <input type="email" name="email" placeholder="Email" required><br><br>

        <!-- Company description -->
        <textarea name="description" placeholder="What does your company do?" required></textarea><br><br>

        <!-- Submit button -->
        <button type="submit">Register</button>
    </form>
</body>
</html>
