<!-- templates/index.html -->
<!doctype html>
<html>
  <head>
    <title>Tender Alerts - Register</title>
  </head>
  <body>
    <h1>Tender Alerts</h1>
    <p>Register your company to receive automatic tender alerts from public tenders.</p>

    <form method="POST">
      <label>Company name:</label><br>
      <input type="text" name="name" required><br><br>

      <label>Email:</label><br>
      <input type="email" name="email" required><br><br>

      <label>Website (optional):</label><br>
      <input type="text" name="website"><br><br>

      <label>Describe what your company does:</label><br>
      <textarea name="description" rows="5" cols="40" required></textarea><br><br>

      <button type="submit">Register</button>
    </form>

    <p><a href="/unsubscribe">Unsubscribe</a></p>
  </body>
</html>
